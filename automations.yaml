- id: "1772037656469"
  alias: "Update Sensor: door_window_remaining_time"
  description: ""
  triggers:
    - trigger: time_pattern
      seconds: /1
  conditions:
    - condition: state
      entity_id: timer.door_window_reset_alarm
      state:
        - active
  actions:
    - action: homeassistant.update_entity
      metadata: {}
      data:
        entity_id:
          - sensor.door_window_remaining_time
  mode: single
- id: "1772037903349"
  alias: "Tür & Fenster Alarm: Countdown zum reaktivieren starten"
  description: ""
  triggers:
    - trigger: state
      entity_id:
        - input_boolean.door_window_alarm_disabled
      to:
        - "on"
  conditions: []
  actions:
    - action: timer.start
      metadata: {}
      target:
        entity_id: timer.door_window_reset_alarm
      data: {}
  mode: single
- id: "1772038407252"
  alias: "Tür & Fenster Alarm: Reaktivieren"
  description: ""
  triggers:
    - trigger: event
      event_type: timer.finished
      event_data:
        entity_id: timer.door_window_reset_alarm
    - trigger: event
      event_type: timer.cancelled
      event_data:
        entity_id: timer.door_window_reset_alarm
  conditions: []
  actions:
    - action: input_boolean.turn_off
      metadata: {}
      target:
        entity_id: input_boolean.door_window_alarm_disabled
      data: {}
  mode: single
- id: "1772038806959"
  alias: "Tür & Fenster Alarm: Countdown zum reaktivieren abbrechen"
  description: ""
  triggers:
    - trigger: state
      entity_id:
        - input_boolean.door_window_alarm_disabled
      to:
        - "off"
    - trigger: state
      entity_id:
        - zone.home
      to:
        - "0"
  conditions: []
  actions:
    - action: timer.cancel
      metadata: {}
      target:
        entity_id: timer.door_window_reset_alarm
      data: {}
  mode: single
- id: "1772040225277"
  alias: "Alle Türen/Fenster geschlossen: Meldung löschen"
  description: ""
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.alle_fenster_haus
      to:
        - "off"
    - trigger: state
      entity_id:
        - binary_sensor.alle_tueren_haus
      to:
        - "off"
  conditions:
    - condition: state
      entity_id: binary_sensor.alle_fenster_haus
      state:
        - "off"
    - condition: state
      entity_id: binary_sensor.alle_tueren_haus
      state:
        - "off"
  actions:
    - action: notify.all_mobile_apps
      metadata: {}
      data:
        message: clear_notification
        data:
          tag: ha_doorwindow
  mode: parallel
  max: 10
