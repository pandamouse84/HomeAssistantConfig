neues_skript:
  sequence:
  - sequence:
    - action: light.turn_on
      metadata: {}
      target:
        area_id: wohnzimmer
      data:
        brightness_pct: 1
        effect: Wohnzimmer Ambiente
    - action: light.turn_on
      metadata: {}
      target:
        area_id: wohnzimmer
      data:
        brightness_pct: 20
        effect: Wohnzimmer Ambiente
        transition: 10
    - if:
      - condition: device
        type: is_off
        device_id: ce0306da09d94ab317b81b340cbfaef6
        entity_id: 47849ce5fa789737bec014f7a2ff2393
        domain: switch
      then:
      - action: switch.turn_on
        metadata: {}
        target:
          device_id: ce0306da09d94ab317b81b340cbfaef6
        data: {}
      - delay:
          hours: 0
          minutes: 0
          seconds: 4
          milliseconds: 0
    - action: remote.turn_on
      metadata: {}
      target:
        device_id: a8038c0dab43f1dde8cac0f3f5e4f47c
      data: {}
    - delay:
        hours: 0
        minutes: 0
        seconds: 3
        milliseconds: 0
    - action: remote.send_command
      metadata: {}
      target:
        device_id: a8038c0dab43f1dde8cac0f3f5e4f47c
      data:
        command:
        - home
  alias: 'Szenen: Wohnzimmer - Fernsehen'
