# Template sensors:
- unique_id: evcc_gridpower_receiving
  name: evcc_gridpower_receiving
  device_class: power
  availability: "{{- is_number(states('sensor.evcc_grid_power')) -}}"
  state: |-
    {{-
      max(0, (states('sensor.evcc_grid_power') | int) )
      | float | round(2)
    -}}
  unit_of_measurement: "W"
- unique_id: evcc_gridpower_distributing
  name: evcc_gridpower_distributing
  device_class: power
  availability: "{{- is_number(states('sensor.evcc_grid_power')) -}}"
  state: |-
    {{-
      max(0, -(states('sensor.evcc_grid_power') | int) )
      | float | round(2)
    -}}
  unit_of_measurement: "W"
