# Template sensors:
- unique_id: evcc_gridpower_receiving
  name: evcc_gridpower_receiving
  device_class: power
  availability: "{{- is_number(state_attr('sensor.evcc_pv_state', 'gridPower')) -}}"
  state: |-
    {{-
      max(0, state_attr("sensor.evcc_pv_state", "gridPower"))
      | float | round(2)
    -}}
  unit_of_measurement: "W"
- unique_id: evcc_gridpower_distributing
  name: evcc_gridpower_distributing
  device_class: power
  availability: "{{- is_number(state_attr('sensor.evcc_pv_state', 'gridPower')) -}}"
  state: |-
    {{-
      max(0, max(0, -state_attr("sensor.evcc_pv_state", "gridPower")))
      | float | round(2)
    -}}
  unit_of_measurement: "W"
